<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Chess - Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #282828; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; border: 1px solid #555; }
        #msg { font-size: 1.2em; font-weight: bold; margin-bottom: 5px; }
        #reset { pointer-events: auto; cursor: pointer; background: #444; color: white; border: 1px solid #888; padding: 5px 10px; border-radius: 4px; margin-top: 10px; }
        #reset:hover { background: #666; }
    </style>
</head>
<body>
<div id="ui">
    <div id="msg">White's Turn</div>
    <div id="check-status"></div>
    <button id="reset" onclick="location.reload()">Reset Game</button>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "gsap": "https://cdn.skypack.dev/gsap"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import gsap from 'gsap';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x282828);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const pl = new THREE.PointLight(0xffffff, 100);
    pl.position.set(5, 10, 5);
    scene.add(pl);

    const PIECE_GEOM = {
        pawn: [[0,0],[0.35,0],[0.3,0.1],[0.25,0.2],[0.15,0.5],[0.25,0.7],[0,0.9]],
        rook: [[0,0],[0.4,0],[0.4,0.2],[0.3,0.25],[0.3,0.7],[0.4,0.8],[0.4,1.1],[0,1.1]],
        knight: [[0,0],[0.4,0],[0.35,0.2],[0.2,0.3],[0.3,0.6],[0.4,0.8],[0.2,1.1],[0,1.2]],
        bishop: [[0,0],[0.4,0],[0.35,0.2],[0.15,0.4],[0.2,0.8],[0.25,1.1],[0,1.4]],
        queen: [[0,0],[0.45,0],[0.4,0.2],[0.2,0.5],[0.3,1.0],[0.4,1.3],[0.2,1.6],[0,1.7]],
        king: [[0,0],[0.45,0],[0.45,0.2],[0.2,0.3],[0.2,1.2],[0.4,1.2],[0.4,1.4],[0.1,1.4],[0.1,1.6],[0,1.8]]
    };

    let whiteToMove = true;
    let gameOver = false;
    let boardState = Array(8).fill(null).map(() => Array(8).fill("--"));

    function createPiece(type, colorCode, r, c) {
        const points = PIECE_GEOM[type].map(p => new THREE.Vector2(p[0], p[1]));
        const mesh = new THREE.Mesh(new THREE.LatheGeometry(points, 32), new THREE.MeshStandardMaterial({ 
            color: colorCode === 'w' ? 0xffffff : 0x222222, roughness: 0.3, metalness: 0.4 
        }));
        mesh.userData = { type, colorCode, originalColor: colorCode === 'w' ? 0xffffff : 0x222222, gridPos: {r, c} };
        boardState[r][c] = colorCode + (type === 'knight' ? 'N' : type[0].toUpperCase());
        return mesh;
    }

    const boardGroup = new THREE.Group();
    const piecesGroup = new THREE.Group();
    scene.add(boardGroup, piecesGroup);

    const layout = ['rook', 'knight', 'bishop', 'queen', 'king', 'bishop', 'knight', 'rook'];
    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
            const sq = new THREE.Mesh(new THREE.BoxGeometry(1, 0.2, 1), new THREE.MeshStandardMaterial({ color: (r + c) % 2 === 0 ? 0xebebd0 : 0x779455 }));
            sq.position.set(c - 3.5, 0, r - 3.5);
            sq.userData = { gridPos: {r, c} };
            boardGroup.add(sq);
            let p = null;
            if (r === 1) p = createPiece('pawn', 'b', r, c);
            else if (r === 6) p = createPiece('pawn', 'w', r, c);
            else if (r === 0) p = createPiece(layout[c], 'b', r, c);
            else if (r === 7) p = createPiece(layout[c], 'w', r, c);
            if (p) { p.position.set(c - 3.5, 0.1, r - 3.5); piecesGroup.add(p); }
        }
    }

    function isPathClear(r1, c1, r2, c2, state) {
        let dr = Math.sign(r2 - r1), dc = Math.sign(c2 - c1);
        let cr = r1 + dr, cc = c1 + dc;
        while (cr !== r2 || cc !== c2) {
            if (state[cr][cc] !== "--") return false;
            cr += dr; cc += dc;
        }
        return true;
    }

    function checkValid(type, color, r, c, tr, tc, state) {
        const target = state[tr][tc];
        if (target !== "--" && target[0] === color) return false;
        const rd = Math.abs(r - tr), cd = Math.abs(c - tc);
        if (type === 'pawn') {
            let dir = color === 'w' ? -1 : 1;
            if (c === tc && tr === r + dir && target === "--") return true;
            if (c === tc && r === (color === 'w' ? 6 : 1) && tr === r + 2*dir && target === "--" && state[r+dir][c] === "--") return true;
            if (cd === 1 && tr === r + dir && target !== "--") return true;
            return false;
        }
        if (type === 'knight') return (rd === 2 && cd === 1) || (rd === 1 && cd === 2);
        if (type === 'rook') return (r === tr || c === tc) && isPathClear(r, c, tr, tc, state);
        if (type === 'bishop') return rd === cd && isPathClear(r, c, tr, tc, state);
        if (type === 'queen') return (rd === cd || r === tr || c === tc) && isPathClear(r, c, tr, tc, state);
        if (type === 'king') return rd <= 1 && cd <= 1;
        return false;
    }

    function getKingPos(color, state) {
        for(let r=0; r<8; r++) for(let c=0; c<8; c++) if(state[r][c] === color+'K') return {r,c};
        return null;
    }

    function isInCheck(color, state) {
        const kp = getKingPos(color, state);
        if(!kp) return false;
        const opp = color === 'w' ? 'b' : 'w';
        for(let r=0; r<8; r++) {
            for(let c=0; c<8; c++) {
                if(state[r][c][0] === opp) {
                    let type = state[r][c][1] === 'P' ? 'pawn' : state[r][c][1] === 'N' ? 'knight' : state[r][c][1] === 'R' ? 'rook' : state[r][c][1] === 'B' ? 'bishop' : state[r][c][1] === 'Q' ? 'queen' : 'king';
                    if(checkValid(type, opp, r, c, kp.r, kp.c, state)) return true;
                }
            }
        }
        return false;
    }

    const controls = new OrbitControls(camera, renderer.domElement);
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let sel = null;

    window.addEventListener('mousedown', (e) => {
        if (gameOver) return;
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const pInt = raycaster.intersectObjects(piecesGroup.children);
        const bInt = raycaster.intersectObjects(boardGroup.children);

        if (pInt.length > 0 && pInt[0].object.userData.colorCode === (whiteToMove ? 'w' : 'b')) {
            if (sel) sel.material.color.set(sel.userData.originalColor);
            sel = pInt[0].object;
            sel.material.color.set(0xff3333);
        } else if (sel && bInt.length > 0) {
            const {r, c} = bInt[0].object.userData.gridPos;
            const old = sel.userData.gridPos;
            if (checkValid(sel.userData.type, sel.userData.colorCode, old.r, old.c, r, c, boardState)) {
                let tempState = boardState.map(row => [...row]);
                tempState[r][c] = tempState[old.r][old.c];
                tempState[old.r][old.c] = "--";
                
                if (!isInCheck(sel.userData.colorCode, tempState)) {
                    boardState = tempState;
                    const cap = piecesGroup.children.find(p => p.userData.gridPos.r === r && p.userData.gridPos.c === c);
                    if (cap) {
                        if (cap.userData.type === 'king') {
                            gameOver = true;
                            document.getElementById('msg').innerText = (whiteToMove ? "WHITE" : "BLACK") + " WINS!";
                        }
                        piecesGroup.remove(cap);
                    }
                    gsap.to(sel.position, { x: c - 3.5, z: r - 3.5, duration: 0.4 });
                    sel.userData.gridPos = {r, c};
                    whiteToMove = !whiteToMove;
                    document.getElementById('msg').innerText = whiteToMove ? "White's Turn" : "Black's Turn";
                    document.getElementById('check-status').innerText = isInCheck(whiteToMove ? 'w' : 'b', boardState) ? "CHECK!" : "";
                }
            }
            sel.material.color.set(sel.userData.originalColor);
            sel = null;
        }
    });

    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    animate();
</script>
</body>
</html>
